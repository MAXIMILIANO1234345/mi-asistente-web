<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Perfiles Tech (Data Lake)</title>
    <!-- Cliente de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-center p-6">

    <div class="max-w-lg w-full bg-white rounded-lg shadow-xl overflow-hidden border border-gray-200">
        <div class="bg-blue-800 p-6">
            <h2 class="text-2xl font-bold text-white">Registro de Talento</h2>
            <p class="text-blue-200 text-sm mt-1">Simulación de Extracción de Datos (Fase E)</p>
        </div>

        <div class="p-8 space-y-5">
            
            <!-- DATO VALIOSO 1 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej: sAúL burgos" 
                    class="w-full bg-gray-50 border border-gray-300 rounded p-3 outline-none focus:border-blue-500">
            </div>

            <!-- DATO VALIOSO 2 (Propenso a ensuciarse) -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Expectativa Salarial Mensual</label>
                <input type="text" id="salario" placeholder="Ej: $15,000 mxn, 10k, quince mil..." 
                    class="w-full bg-gray-50 border border-gray-300 rounded p-3 outline-none focus:border-blue-500">
            </div>

            <!-- DATO VALIOSO 3 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Lenguaje de Programación Principal</label>
                <input type="text" id="lenguaje" placeholder="Ej: Python, JS, C++" 
                    class="w-full bg-gray-50 border border-gray-300 rounded p-3 outline-none focus:border-blue-500">
            </div>

            <!-- DATO INÚTIL (Basura de negocio) -->
            <div class="bg-orange-50 p-4 rounded border border-orange-200 mt-6">
                <label class="block text-sm font-bold text-orange-900 mb-1">Comida Favorita (Dato de relleno)</label>
                <p class="text-xs text-orange-700 mb-2">Este dato es válido, pero inútil para la empresa.</p>
                <input type="text" id="dato_inutil" placeholder="Ej: Tacos al pastor" 
                    class="w-full bg-white border border-orange-300 rounded p-3 outline-none focus:border-orange-500">
            </div>

            <button id="btnEnviar" onclick="extraerDatos()" 
                class="w-full bg-blue-800 hover:bg-blue-700 text-white font-bold py-3 rounded mt-4 transition">
                Inyectar a la Base de Datos Cruda
            </button>

            <!-- Mensaje de estado -->
            <div id="mensaje" class="hidden text-center text-sm font-bold p-3 mt-4 rounded"></div>
        </div>
    </div>

    <script>
        // 1. REEMPLAZA ESTO CON TUS CREDENCIALES DE SUPABASE
        const supabaseUrl = 'TU_URL_AQUI';
        const supabaseKey = 'TU_KEY_AQUI';
        const supabase = supabaseOrigin.createClient(supabaseUrl, supabaseKey);

        async function extraerDatos() {
            const btn = document.getElementById('btnEnviar');
            const msj = document.getElementById('mensaje');
            
            // Empaquetamos todo en un JSON sin discriminar nada (Fase E pura)
            const payload = {
                nombre: document.getElementById('nombre').value,
                sueldo: document.getElementById('salario').value,
                tech: document.getElementById('lenguaje').value,
                info_basura: document.getElementById('dato_inutil').value
            };

            // Validación mínima para que no manden vacío
            if(!payload.nombre) {
                alert("Por lo menos pon tu nombre.");
                return;
            }

            btn.innerText = 'Cargando...';
            btn.disabled = true;

            // Inyectamos a la tabla 'landing_zone' en la columna JSON 'carga_bruta'
            const { error } = await supabase
                .from('landing_zone')
                .insert([{ carga_bruta: payload }]);

            btn.innerText = 'Inyectar a la Base de Datos Cruda';
            btn.disabled = false;
            msj.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-800');

            if (error) {
                msj.innerText = "Error: " + error.message;
                msj.classList.add('bg-red-100', 'text-red-700');
            } else {
                msj.innerText = "¡Datos extraídos y cargados exitosamente!";
                msj.classList.add('bg-green-100', 'text-green-800');
                
                // Limpiar campos
                document.querySelectorAll('input').forEach(input => input.value = '');
            }
        }
    </script>
</body>
</html>
