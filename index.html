<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orquestador IA - V35</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
        :root {
            --bg-app: #121212; --bg-panel: #1e1e1e; --bg-message-ai: #1a1a1a;
            --bg-message-user: #2d2d2d; --accent-blender: #e87d0d;
            --text-main: #e0e0e0; --border: #333; --code-bg: #0d0d0d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg-app);
            color: var(--text-main); display: flex; height: 100vh; overflow: hidden;
        }

        .app-layout { display: flex; width: 100vw; height: 100vh; }

        .chat-section {
            width: 500px; min-width: 400px; background-color: var(--bg-panel);
            display: flex; flex-direction: column; border-right: 1px solid var(--border);
            z-index: 10; box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .viewport-section { flex: 1; position: relative; background-color: #111; }

        header {
            padding: 20px; border-bottom: 1px solid var(--border); display: flex;
            align-items: center; gap: 15px; background-color: #151515;
        }
        header i { font-size: 1.8rem; color: var(--accent-blender); }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .message { margin-bottom: 25px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { display: flex; justify-content: flex-end; }
        .message.user .bubble {
            background-color: var(--bg-message-user); padding: 15px 20px;
            border-radius: 15px 15px 4px 15px; max-width: 85%; border: 1px solid #444;
        }

        .message.ai .ai-avatar {
            display: flex; align-items: center; gap: 8px; color: var(--accent-blender);
            margin-bottom: 10px; font-weight: 600; font-size: 0.9rem;
        }
        
        .ai-content {
            background-color: var(--bg-message-ai); border: 1px solid var(--border);
            border-radius: 4px 15px 15px 15px; padding: 20px; font-size: 0.95rem; line-height: 1.6;
        }

        .ai-content pre {
            background: var(--code-bg) !important; padding: 15px; border-radius: 8px;
            border: 1px solid #444; overflow-x: auto; margin: 15px 0;
        }
        
        .source-tag {
            display: inline-flex; align-items: center; gap: 6px; margin-top: 15px;
            font-size: 0.75rem; color: #aaa; background: #000; padding: 6px 14px;
            border-radius: 20px; border: 1px solid #333;
        }

        .input-area {
            padding: 20px; background-color: #151515; border-top: 1px solid var(--border);
            display: flex; gap: 12px;
        }
        textarea {
            flex: 1; background-color: var(--bg-app); border: 1px solid #444;
            color: white; padding: 15px; border-radius: 8px; resize: none; height: 60px;
            font-family: inherit; transition: 0.2s;
        }
        textarea:focus { outline: none; border-color: var(--accent-blender); }

        button {
            background-color: var(--accent-blender); color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: 600; width: 100px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        button:hover { background-color: #d6730b; }
        button:disabled { background-color: #555; cursor: not-allowed; }

        .spinner {
            width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .viewport-controls {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px;
            border: 1px solid #444; color: white; font-weight: 600; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="chat-section">
            <header>
                <i class="fa-solid fa-cube"></i>
                <div>
                    <h1>Orquestador IA</h1>
                    <span style="color: #888; font-size: 0.8rem;">Modo Estructurado JSON</span>
                </div>
            </header>

            <div id="chat-window">
                <div class="message ai">
                    <div class="ai-avatar"><i class="fa-solid fa-bolt"></i> Sistema V35</div>
                    <div class="ai-content">
                        <p>El motor lógico ha sido actualizado. El backend ahora estructura el código rigurosamente y lo inyecta directo en el lienzo 3D. <strong>Pídele que construya un robot complejo.</strong></p>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="user-input" placeholder="Ej: Escribe un script de Blender para hacer un robot rojo con cilindros..."></textarea>
                <button id="send-btn">
                    <span class="btn-text"><i class="fa-solid fa-paper-plane"></i></span>
                    <div class="spinner"></div>
                </button>
            </div>
        </div>

        <div class="viewport-section">
            <div class="viewport-controls"><i class="fa-solid fa-vr-cardboard"></i> Live Viewport</div>
            
            <a-scene embedded>
                <a-entity position="0 2 6"><a-camera look-controls wasd-controls></a-camera></a-entity>
                <a-light type="ambient" color="#555"></a-light>
                <a-light type="directional" position="2 4 3" intensity="0.8" castShadow="true"></a-light>
                
                <a-sky color="#111"></a-sky>
                <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#222" wireframe="true"></a-plane>

                <a-entity id="scene-objects" position="0 1 0">
                    <a-box color="#e87d0d" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear;"></a-box>
                </a-entity>
            </a-scene>
        </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <script>
        // ⚠️ CAMBIA ESTO POR TU URL DE RENDER
        const RENDER_URL = "[https://mi-backend-ia-2.onrender.com](https://mi-backend-ia-2.onrender.com)"; 
        const API_ENDPOINT = `${RENDER_URL}/preguntar`;

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const btnText = sendBtn.querySelector('.btn-text');
        const spinner = sendBtn.querySelector('.spinner');
        const sceneObjects = document.getElementById('scene-objects');

        marked.setOptions({ breaks: true, gfm: true });

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            setLoading(true);

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: text })
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const data = await response.json();
                
                // 1. Mostrar en el Chat
                appendAIMessage(data);

                // 2. MAGIA A-FRAME: Inyección directa
                if (data.aframe_html && data.aframe_html.trim() !== "") {
                    // Animación de entrada suave
                    sceneObjects.innerHTML = `<a-entity scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 800; easing: easeOutElastic">${data.aframe_html}</a-entity>`;
                }

            } catch (error) {
                appendErrorMessage("El servidor o la conexión ngrok fallaron.");
            } finally {
                setLoading(false);
                scrollToBottom();
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'user') div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            chatWindow.appendChild(div);
            scrollToBottom();
        }

        function appendAIMessage(data) {
            const div = document.createElement('div');
            div.className = 'message ai';

            // Armado limpio de la respuesta
            let htmlContent = `<p>${marked.parse(data.explicacion)}</p>`;
            
            if (data.blender_python) {
                htmlContent += `<pre><code class="language-python">${data.blender_python.trim()}</code></pre>`;
            }

            // Fallback si la IA se rompió y envió todo crudo
            if (data.respuesta_cruda && !data.blender_python) {
                htmlContent = `<p>⚠️ El modelo no devolvió un JSON válido. Aquí está su respuesta cruda:</p><pre><code>${data.respuesta_cruda}</code></pre>`;
            }

            div.innerHTML = `
                <div class="ai-avatar"><i class="fa-solid fa-microchip"></i> Orquestador</div>
                <div class="ai-content">
                    ${htmlContent}
                    <div class="source-tag"><i class="fa-solid fa-check"></i> ${data.fuente || "Procesado"}</div>
                </div>
            `;

            chatWindow.appendChild(div);
            div.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
            scrollToBottom();
        }

        function appendErrorMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.innerHTML = `<div class="ai-content" style="border-left: 4px solid #ff4444;"><p style="color:#ff4444;"><i class="fa-solid fa-triangle-exclamation"></i> ${msg}</p></div>`;
            chatWindow.appendChild(div);
            scrollToBottom();
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'block';
            spinner.style.display = isLoading ? 'block' : 'none';
            userInput.disabled = isLoading;
            if (!isLoading) userInput.focus();
        }

        function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }
    </script>
</body>
</html>
