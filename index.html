<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orquestador Blender AI</title>
    
    <!-- Fuentes y Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Estilos para Código (Highlight.js) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">

    <style>
        :root {
            --bg-app: #181818;
            --bg-panel: #2b2b2b;
            --bg-message-ai: #232323;
            --bg-message-user: #373737;
            --accent-blender: #e87d0d; /* Naranja Blender */
            --text-main: #e6e6e6;
            --text-dim: #b0b0b0;
            --border: #3c3c3c;
            --code-bg: #1e1e1e;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-app);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* HEADER */
        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: var(--bg-panel);
        }

        header i { font-size: 1.5rem; color: var(--accent-blender); }
        header h1 { font-size: 1.1rem; margin: 0; font-weight: 600; letter-spacing: 0.5px; }
        .status-badge {
            margin-left: auto;
            font-size: 0.75rem;
            background: #2d3f2f;
            color: #4cd964;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #3a5c3d;
        }

        /* CHAT AREA */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* USER MESSAGE */
        .message.user {
            display: flex;
            justify-content: flex-end;
        }
        .message.user .bubble {
            background-color: var(--bg-message-user);
            padding: 10px 15px;
            border-radius: 12px 12px 2px 12px;
            max-width: 80%;
            font-size: 0.95rem;
        }

        /* AI MESSAGE STRUCTURE */
        .message.ai {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 95%;
        }

        .ai-avatar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--accent-blender);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .ai-content {
            background-color: var(--bg-message-ai);
            border: 1px solid var(--border);
            border-radius: 0 12px 12px 12px;
            padding: 20px;
            width: 100%;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-main); /* Forzar color de texto */
        }

        /* MARKDOWN STYLES */
        .ai-content p { margin-top: 0; }
        .ai-content code {
            background: #333;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }
        .ai-content pre {
            background: var(--code-bg) !important;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow-x: auto;
            margin: 15px 0;
        }

        /* KNOWLEDGE CARDS GRID */
        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .knowledge-card {
            background-color: #2a2a2a;
            border-left: 3px solid var(--accent-blender);
            padding: 12px 15px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        .k-title {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .k-body {
            font-size: 0.9rem;
        }
        
        .k-body code {
            display: block;
            margin-top: 5px;
            white-space: pre-wrap;
            color: #9cdcfe; /* Azul código */
        }

        .source-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 15px;
            font-size: 0.75rem;
            color: #666;
            background: #222;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* INPUT AREA */
        .input-area {
            padding: 20px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-app);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            resize: none;
            height: 50px;
            font-family: inherit;
        }
        textarea:focus { outline: 1px solid var(--accent-blender); }

        button {
            background-color: var(--accent-blender);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover { background-color: #d6730b; }
        button:disabled { background-color: #555; cursor: wait; }

    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <i class="fa-solid fa-cube"></i> <!-- Icono Blender -->
            <div>
                <h1>Orquestador IA</h1>
                <span style="font-size: 0.8rem; color: #888;">Blender 4.2 API Compatible</span>
            </div>
            <div class="status-badge"><i class="fa-solid fa-circle-check"></i> Online</div>
        </header>

        <div id="chat-window">
            <!-- Mensaje de Bienvenida -->
            <div class="message ai">
                <div class="ai-avatar"><i class="fa-solid fa-robot"></i> Orquestador</div>
                <div class="ai-content">
                    <p>Hola. Soy tu asistente técnico conectado a la base de datos de conocimiento de Blender.</p>
                    <p>Puedo consultar mi memoria interna o investigar en tiempo real. ¿Qué deseas crear hoy?</p>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="user-input" placeholder="Ej: Cómo creo un cubo rojo con Python?"></textarea>
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <!-- Scripts: Marked (Markdown) y Highlight.js (Código) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/languages/python.min.js"></script>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const API_URL = 'https://mi-backend-ia-2.onrender.com/preguntar'; // TU URL

        // Configuración de Marked (Markdown)
        marked.setOptions({
            highlight: function(code, lang) {
                const language = highlight.getLanguage(lang) ? lang : 'python';
                return highlight.highlight(code, { language }).value;
            }
        });

        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Mostrar mensaje Usuario
            appendUserMessage(text);
            userInput.value = '';
            sendBtn.disabled = true;
            sendBtn.innerText = '...';

            try {
                // 2. Llamada al API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: text })
                });

                if (!response.ok) throw new Error("Error en servidor");
                const data = await response.json();
                console.log("Respuesta recibida:", data); // Debug en consola

                // 3. Renderizar Respuesta Estructurada
                appendAIMessage(data);

            } catch (error) {
                appendErrorMessage();
                console.error(error);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = 'Enviar';
                scrollToBottom();
            }
        }

        function appendUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `<div class="bubble">${text}</div>`;
            chatWindow.appendChild(div);
            scrollToBottom();
        }

        function appendAIMessage(data) {
            const div = document.createElement('div');
            div.className = 'message ai';

            // Determinar Icono de Fuente
            const esMemoria = data.fuente && data.fuente.includes("Memoria");
            const iconoFuente = esMemoria ? '<i class="fa-solid fa-brain"></i>' : '<i class="fa-solid fa-globe"></i>';
            const colorFuente = esMemoria ? '#4cd964' : '#4cc2d9';

            // Procesar Puntos Clave en HTML de Tarjetas
            let gridHTML = '';
            if (data.puntos_clave && data.puntos_clave.length > 0) {
                gridHTML = `<div class="knowledge-grid">`;
                data.puntos_clave.forEach(punto => {
                    // Detectar si es código
                    const esCodigo = punto.titulo.toLowerCase().includes("código") || punto.titulo.toLowerCase().includes("script");
                    const icon = esCodigo ? '<i class="fa-brands fa-python"></i>' : '<i class="fa-solid fa-lightbulb"></i>';
                    
                    let contenido = punto.descripcion;
                    if (esCodigo) {
                        // Resaltado simple para tarjetas pequeñas
                        contenido = `<code>${punto.descripcion}</code>`;
                    }

                    gridHTML += `
                        <div class="knowledge-card">
                            <div class="k-title">${icon} ${punto.titulo}</div>
                            <div class="k-body">${contenido}</div>
                        </div>
                    `;
                });
                gridHTML += `</div>`;
            }

            // BLINDAJE: Detectar texto en cualquiera de los formatos posibles
            // Esto arregla el problema de "texto invisible"
            const rawText = data.respuesta_principal || data.respuesta || "⚠️ La IA respondió, pero el formato no contiene texto legible.";

            // Renderizar contenido principal con Markdown
            const mainContent = marked.parse(rawText);

            div.innerHTML = `
                <div class="ai-avatar"><i class="fa-solid fa-robot"></i> Orquestador</div>
                <div class="ai-content">
                    ${mainContent}
                    ${gridHTML}
                    <div class="source-tag" style="color: ${colorFuente}">
                        ${iconoFuente} Fuente: ${data.fuente || "Desconocida"}
                    </div>
                </div>
            `;

            chatWindow.appendChild(div);
            
            // Aplicar resaltado de sintaxis a los bloques de código generados por Markdown
            div.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        function appendErrorMessage() {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.innerHTML = `
                <div class="ai-content" style="border-color: #ff4444;">
                    <p style="color: #ff4444;"><i class="fa-solid fa-triangle-exclamation"></i> Error de conexión con el Orquestador.</p>
                </div>`;
            chatWindow.appendChild(div);
        }

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
