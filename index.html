<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orquestador Blender AI - V30 Client</title>
    
    <!-- Fuentes y Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Estilos para Código (Highlight.js) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">

    <style>
        :root {
            --bg-app: #181818;
            --bg-panel: #2b2b2b;
            --bg-message-ai: #232323;
            --bg-message-user: #373737;
            --accent-blender: #e87d0d; /* Naranja Blender */
            --text-main: #e6e6e6;
            --text-dim: #b0b0b0;
            --border: #3c3c3c;
            --code-bg: #1e1e1e;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-app);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* HEADER */
        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: var(--bg-panel);
        }

        header i { font-size: 1.5rem; color: var(--accent-blender); }
        header h1 { font-size: 1.1rem; margin: 0; font-weight: 600; letter-spacing: 0.5px; }
        .status-badge {
            margin-left: auto;
            font-size: 0.75rem;
            background: #2d3f2f;
            color: #4cd964;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #3a5c3d;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* CHAT AREA */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* USER MESSAGE */
        .message.user {
            display: flex;
            justify-content: flex-end;
        }
        .message.user .bubble {
            background-color: var(--bg-message-user);
            padding: 10px 15px;
            border-radius: 12px 12px 2px 12px;
            max-width: 80%;
            font-size: 0.95rem;
            border: 1px solid #444;
        }

        /* AI MESSAGE STRUCTURE */
        .message.ai {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 95%;
        }

        .ai-avatar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--accent-blender);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .ai-content {
            background-color: var(--bg-message-ai);
            border: 1px solid var(--border);
            border-radius: 0 12px 12px 12px;
            padding: 20px;
            width: 100%;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-main);
        }

        /* MARKDOWN STYLES */
        .ai-content p { margin-top: 0; margin-bottom: 1rem; }
        .ai-content p:last-child { margin-bottom: 0; }
        
        .ai-content code {
            background: #333;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: #e06c75;
        }
        
        .ai-content pre {
            background: var(--code-bg) !important;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow-x: auto;
            margin: 15px 0;
        }
        
        .ai-content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
            font-size: 0.9em;
        }

        /* KNOWLEDGE CARDS GRID */
        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .knowledge-card {
            background-color: #2a2a2a;
            border-left: 3px solid var(--accent-blender);
            padding: 12px 15px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        .k-title {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .k-body { font-size: 0.9rem; color: #ccc; }

        .source-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 15px;
            font-size: 0.75rem;
            color: #888;
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        /* INPUT AREA */
        .input-area {
            padding: 20px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-app);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            resize: none;
            height: 50px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        textarea:focus { outline: none; border-color: var(--accent-blender); }

        button {
            background-color: var(--accent-blender);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            height: 50px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 100px;
        }
        button:hover { background-color: #d6730b; }
        button:disabled { background-color: #444; cursor: not-allowed; opacity: 0.7; }

        /* LOADING SPINNER */
        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <i class="fa-solid fa-cube"></i>
            <div>
                <h1>Orquestador IA <span style="font-size: 0.8rem; opacity: 0.7;">V30</span></h1>
                <span style="font-size: 0.8rem; color: #888;">Gemma Local + Maestro Remoto</span>
            </div>
            <div class="status-badge" id="status-badge">
                <i class="fa-solid fa-circle"></i> Conectado
            </div>
        </header>

        <div id="chat-window">
            <div class="message ai">
                <div class="ai-avatar"><i class="fa-solid fa-robot"></i> Sistema</div>
                <div class="ai-content">
                    <p><strong>Orquestador V30 en línea.</strong></p>
                    <p>Estoy conectado a tu cerebro local (Gemma) y sincronizado con el Maestro. Puedo tardar unos segundos si estoy "despertando" a tu PC. ¿Qué script de Blender necesitas?</p>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="user-input" placeholder="Ej: Escribe un script para crear 50 cubos aleatorios..."></textarea>
            <button id="send-btn">
                <span class="btn-text">Enviar</span>
                <div class="spinner"></div>
            </button>
        </div>
    </div>

    <!-- Librerías Externas -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/languages/python.min.js"></script>

    <script>
        // ==========================================
        // ⚠️ CONFIGURACIÓN: PEGA TU URL DE RENDER AQUÍ
        // ==========================================
        const RENDER_URL = "https://tu-app-en-render.onrender.com"; 
        const API_ENDPOINT = `${RENDER_URL}/preguntar`;

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const btnText = sendBtn.querySelector('.btn-text');
        const spinner = sendBtn.querySelector('.spinner');

        // Configurar Markdown
        marked.setOptions({
            highlight: function(code, lang) {
                const language = highlight.getLanguage(lang) ? lang : 'python';
                return highlight.highlight(code, { language }).value;
            },
            breaks: true
        });

        // Listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // UI: Mensaje Usuario
            appendMessage('user', text);
            userInput.value = '';
            
            // UI: Estado Cargando
            setLoading(true);

            try {
                // Validación básica de URL
                if(RENDER_URL.includes("tu-app-en-render")) {
                    throw new Error("⚠️ Por favor configura la variable RENDER_URL en el código HTML con tu dirección real.");
                }

                console.log("📡 Enviando a:", API_ENDPOINT);
                
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: text })
                });

                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const data = await response.json();
                console.log("✅ Respuesta del Orquestador:", data);

                // Renderizar Respuesta IA
                appendAIMessage(data);

            } catch (error) {
                console.error(error);
                appendErrorMessage(error.message);
            } finally {
                setLoading(false);
                scrollToBottom();
            }
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            if (isLoading) {
                btnText.style.display = 'none';
                spinner.style.display = 'block';
                userInput.disabled = true;
            } else {
                btnText.style.display = 'block';
                spinner.style.display = 'none';
                userInput.disabled = false;
                userInput.focus();
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            if (role === 'user') {
                div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            }
            chatWindow.appendChild(div);
            scrollToBottom();
        }

        function appendAIMessage(data) {
            const div = document.createElement('div');
            div.className = 'message ai';

            // 1. Extraer Fuente
            const fuente = data.fuente || "Desconocida";
            const esMemoria = fuente.toLowerCase().includes("memoria");
            const esLocal = fuente.toLowerCase().includes("local");
            
            let colorFuente = '#888';
            if (esMemoria) colorFuente = '#4cd964'; // Verde
            if (esLocal) colorFuente = '#e87d0d';   // Naranja

            // 2. Procesar Texto Principal (Markdown)
            // app.py V30 devuelve 'respuesta_principal'
            const rawContent = data.respuesta_principal || data.respuesta || "⚠️ Respuesta vacía.";
            const htmlContent = marked.parse(rawContent);

            // 3. Procesar Tarjetas (Puntos Clave)
            let cardsHTML = '';
            if (Array.isArray(data.puntos_clave) && data.puntos_clave.length > 0) {
                cardsHTML = `<div class="knowledge-grid">`;
                data.puntos_clave.forEach(p => {
                    // Blindaje: a veces el LLM devuelve strings en vez de objetos
                    const titulo = p.titulo || "Nota";
                    const desc = p.descripcion || (typeof p === 'string' ? p : "");
                    
                    const esCode = titulo.toLowerCase().includes("código") || titulo.toLowerCase().includes("python");
                    const icon = esCode ? '<i class="fa-brands fa-python"></i>' : '<i class="fa-solid fa-lightbulb"></i>';

                    cardsHTML += `
                        <div class="knowledge-card">
                            <div class="k-title">${icon} ${titulo}</div>
                            <div class="k-body">${esCode ? `<code>${desc}</code>` : desc}</div>
                        </div>
                    `;
                });
                cardsHTML += `</div>`;
            }

            div.innerHTML = `
                <div class="ai-avatar"><i class="fa-solid fa-brain"></i> Orquestador</div>
                <div class="ai-content">
                    ${htmlContent}
                    ${cardsHTML}
                    <div class="source-tag" style="border-color: ${colorFuente}; color: ${colorFuente};">
                        <i class="fa-solid fa-server"></i> Fuente: ${fuente}
                    </div>
                </div>
            `;

            chatWindow.appendChild(div);
            
            // Re-aplicar highlight.js
            div.querySelectorAll('pre code').forEach((el) => {
                hljs.highlightElement(el);
            });
        }

        function appendErrorMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.innerHTML = `
                <div class="ai-content" style="border-color: #ff4444; background: #2a1a1a;">
                    <p style="color: #ff6b6b; font-weight: bold;">
                        <i class="fa-solid fa-triangle-exclamation"></i> Error de Conexión
                    </p>
                    <p style="color: #e6e6e6;">${msg}</p>
                    <p style="font-size: 0.8em; color: #999;">Verifica que la URL de Render en el código HTML sea correcta y que el servicio esté activo.</p>
                </div>`;
            chatWindow.appendChild(div);
        }

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
